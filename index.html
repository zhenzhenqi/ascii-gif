<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>GIF to ASCII GIF Converter</title>
</head>

<body>
	<h1>GIF to ASCII GIF Converter</h1>
	<div class="controls">
		<input type="file" id="fileInput" accept="image/gif">
		<select id="filterSelect">
			<option value="braille">Braille (High Res)</option>
			<option value="ascii">Classic ASCII</option>
		</select>
		<button id="processBtn">Start Conversion</button>
	</div>
	<div id="status"></div>

	<h3>Preview:</h3>
	<pre id="ascii-preview" style="font-family: monospace; line-height: 1; letter-spacing: 0;"></pre>

	<h3>Result:</h3>
	<div id="result"></div>

	<script type="module" src="/script/app.js"></script>
</body>

</html>
